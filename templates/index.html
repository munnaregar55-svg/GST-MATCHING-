<!DOCTYPE html>
<html>
<head>
    <title>ReconPro GST</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-light">

<nav class="navbar navbar-expand-lg navbar-dark bg-primary">
    <div class="container">
        <a class="navbar-brand fw-bold" href="#">ReconPro GST</a>
    </div>
</nav>

<div class="container mt-5">

    <div class="text-center mb-4">
        <h2 class="fw-bold">Smart GST Reconciliation System</h2>
        <p class="text-muted">Auto Matching • ITC Control • Reverse Charge Tracking</p>
    </div>

    <div class="row text-center mb-4">
        <div class="col-md-3">
            <div class="card shadow-sm">
                <div class="card-body">
                    <h6>Total Books ITC</h6>
                    <h4>₹ 0</h4>
                </div>
            </div>
        </div>

        <div class="col-md-3">
            <div class="card shadow-sm">
                <div class="card-body">
                    <h6>Total Portal ITC</h6>
                    <h4>₹ 0</h4>
                </div>
            </div>
        </div>

        <div class="col-md-3">
            <div class="card shadow-sm">
                <div class="card-body">
                    <h6>Difference</h6>
                    <h4>₹ 0</h4>
                </div>
            </div>
        </div>

        <div class="col-md-3">
            <div class="card shadow-sm">
                <div class="card-body">
                    <h6>Total RC Payable</h6>
                    <h4>₹ 0</h4>
                </div>
            </div>
        </div>
    </div>

    <div class="card shadow-lg p-4">
        <form action="/match" method="post" enctype="multipart/form-data">

            <div class="mb-3">
                <label class="form-label fw-bold">Upload Purchase Register</label>
                <input type="file" name="purchase" class="form-control" required>
            </div>

            <div class="mb-3">
                <label class="form-label fw-bold">Upload GSTR2B</label>
                <input type="file" name="gstr2b" class="form-control" required>
            </div>

            <div class="text-center">
                <button type="submit" class="btn btn-primary btn-lg px-5">
                    MATCH & ANALYZE
                </button>
            </div>

        </form>
    </div>

</div>

<footer class="text-center mt-5 mb-3 text-muted">
    ReconPro GST v1.0 • Designed for Accountants
</footer>

</body>
</html>
