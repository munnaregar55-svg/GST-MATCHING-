<!DOCTYPE html>
<html>
<head>
    <title>GST Matching Tool</title>

    <style>

        body{
            font-family: Arial;
            background:#f2f2f2;
            padding:40px;
        }

        .container{
            background:white;
            padding:30px;
            border-radius:10px;
            width:450px;
            margin:auto;
            box-shadow:0 0 10px #ccc;
        }

        h2{
            text-align:center;
            color:green;
        }

        input{
            width:100%;
            padding:10px;
            margin-top:10px;
            margin-bottom:20px;
        }

        button{
            width:100%;
            padding:12px;
            background:green;
            color:white;
            border:none;
            border-radius:5px;
            font-size:16px;
            cursor:pointer;
        }

        button:hover{
            background:darkgreen;
        }

    </style>

</head>

<body>

<div class="container">

    <h2>GST Matching Tool</h2>

    <form method="POST" enctype="multipart/form-data">

        <label>Upload Purchase CSV</label>
        <input type="file" name="purchase" required>

        <label>Upload GSTR2B CSV</label>
        <input type="file" name="gstr2b" required>

        <button type="submit">
            Match GST Data
        </button>

    </form>

</div>

</body>
</html>
